            background: #f4f4f4;
            display: flex;
            align-items: center;

            height: 100vh;

        .container {
            text-align: center;
            background: white;

            width: 90%;
        }

            border-radius: 10px;
            margin-bottom: 20px;
        }


        
        a.button {
            display: inline-block;
            padding: 14px 28px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        a.button:hover {
            background: #0056b3;
        }
